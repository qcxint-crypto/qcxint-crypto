name: awan profile

on:
  push:
    branches: [main, master]
    paths: ["awan.json"]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  awan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install awan-profile
        run: cargo install --git https://github.com/codewithwan/awan awan-profile --locked || cargo install --git https://github.com/codewithwan/awan awan-profile

      - name: Render awan gif
        run: awan-profile whoami --config awan.json

      - name: Shrink the GIF
        run: |
          sudo apt-get update && sudo apt-get install -y gifsicle
          gifsicle -O3 --lossy=80 --colors 64 assets/awan.gif -o assets/awan.gif

      - name: Commit the result
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/awan.gif
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "chore: refresh awan profile"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
